<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تماس با ما</title>

    <link
      href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./call.css" />
    <link rel="stylesheet" href="./call.js" />
  </head>
  <body>
    <div class="contact-page">
      <div class="form-container animate__animated animate__fadeInUp">
        <h2><i class="fa-solid fa-envelope-open-text me-2"></i>تماس با ما</h2>
        <form id="contact-form" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label"
              ><i class="fa-solid fa-user me-1"></i>نام و نام خانوادگی</label
            >
            <input
              type="text"
              id="name"
              name="user_name"
              class="form-control"
              required
              placeholder=""
            />
            <div class="invalid-feedback">لطفاً نام خود را وارد کنید.</div>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label"
              ><i class="fa-solid fa-envelope me-1"></i>ایمیل</label
            >
            <input
              type="email"
              id="email"
              name="user_email"
              class="form-control"
              required
              placeholder=""
            />
            <div class="invalid-feedback">لطفاً ایمیل معتبر وارد کنید.</div>
          </div>
          <div class="mb-3">
            <label for="message" class="form-label"
              ><i class="fa-solid fa-comment me-1"></i>پیام شما</label
            >
            <textarea
              id="message"
              name="message"
              rows="5"
              class="form-control"
              required
              placeholder="پیام خود را اینجا بنویسید..."
            ></textarea>
            <div class="invalid-feedback">لطفاً پیام را وارد کنید.</div>
          </div>
          <button type="submit" class="btn btn-primary btn-submit">
            <i class="fa-solid fa-paper-plane me-1"></i>ارسال پیام
          </button>
        </form>
        <div id="status" class="mt-3 text-center"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script src="call.js"></script>
  </body>
</html>
