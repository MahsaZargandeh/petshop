<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ورود و ثبت‌نام</title>
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <!--bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  <link rel="stylesheet" href="welcom.css" />
  <link rel="stylesheet" href="welcom.js">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body id="body" class="dark">
  <img class="pet-bg" src="./img/logoo.jpg" alt="سگ کارتونی" />

  <div class="wrapper">
    <div class="container">
      <form id="loginForm" class="form active">
        <h2>ورود</h2>
        <input type="email" placeholder="ایمیل" required />
        <input type="password" placeholder="رمز عبور" required />
        <button type="button">ورود</button>
        <p>حساب نداری؟ <button type="button" onclick="switchForm('signup')">ثبت‌نام کن</button></p>
        <div class="social-icons">
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-telegram"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
      </form>

      <form id="signupForm" class="form">
        <h2>ثبت‌نام</h2>
        <input type="text" placeholder="نام کامل" required />
        <input type="email" placeholder="ایمیل" required />
        <input type="password" placeholder="رمز عبور" required />
        <button type="button">ثبت‌نام</button>
        <p>حساب داری؟ <button type="button" onclick="switchForm('login')">وارد شو</button></p>
        <div class="social-icons">
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-telegram"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
      </form>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
